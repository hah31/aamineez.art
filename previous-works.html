<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Previous Works — Aamineez</title>
  <meta name="description" content="Previously sold calligraphy pieces by Aamineez.">
  <meta property="og:title" content="Previous Works — Aamineez">
  <meta property="og:description" content="Previously sold calligraphy pieces by Aamineez.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://aamineez.art/previous-works.html">
  <meta property="og:image" content="https://aamineez.art/images/artwork/thumbs/bluewhitecontext.webp">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" type="image/png" href="images/logo.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="site-title">Aamineez</a>
      <nav class="site-nav">
        <a href="/#work">Work</a>
        <a href="/previous-works.html">Previous Works</a>
        <a href="/#about">About</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <h1>Calligraphy</h1>
      <p class="hero-subtitle">Pieces from past collections</p>
    </section>

    <section id="work" class="gallery-section">
      <div class="gallery" id="gallery" data-status-filter="sold">
        <!-- Rendered by JS from artwork data -->
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 Aamineez</p>
  </footer>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Artwork viewer" hidden>
    <button class="lightbox-close" aria-label="Close">&times;</button>
    <div class="lightbox-nav">
      <button class="lightbox-prev" aria-label="Previous artwork">&lsaquo;</button>
      <button class="lightbox-next" aria-label="Next artwork">&rsaquo;</button>
    </div>
    <figure class="lightbox-content">
      <img class="lightbox-img" id="lightbox-img" src="" alt="">
      <figcaption class="lightbox-caption" id="lightbox-caption"></figcaption>
    </figure>
  </div>

  <script src="js/artwork.js" defer></script>
  <script src="js/main.js" defer></script>
</body>
</html>
