<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <!-- Petal gradients — light tip to deep base, mimicking 3-D cylindrical shading -->
    <linearGradient id="p0" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#F3EEFF"/>
      <stop offset="35%"  stop-color="#C084FC"/>
      <stop offset="100%" stop-color="#3B0764"/>
    </linearGradient>
    <linearGradient id="p45" gradientTransform="rotate(45,0.5,0.5)" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#EDE9FE"/>
      <stop offset="35%"  stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#2E1065"/>
    </linearGradient>
    <linearGradient id="p90" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%"   stop-color="#DDD6FE"/>
      <stop offset="35%"  stop-color="#9333EA"/>
      <stop offset="100%" stop-color="#3B0764"/>
    </linearGradient>
    <linearGradient id="p135" gradientTransform="rotate(135,0.5,0.5)" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#C4B5FD"/>
      <stop offset="35%"  stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#2E1065"/>
    </linearGradient>
    <!-- Shared highlight overlay gradient (lightens the front face of each petal) -->
    <radialGradient id="shine" cx="38%" cy="25%" r="65%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="60%"  stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- Drop-shadow filter for depth -->
    <filter id="depth" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#1a003d" flood-opacity="0.8"/>
    </filter>
    <!-- Soft outer glow -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feFlood flood-color="#9333EA" flood-opacity="0.45" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Black background -->
  <rect width="1080" height="1080" fill="#000000"/>

  <!-- ── Asterisk / flower shape ──────────────────────────────
       8 rounded-rectangle petals, each 130 px wide × 370 px tall,
       radiating from the centre (540, 560) at 45° intervals.
       A slight perspective tilt is faked by scaling the group
       vertically and offsetting the centre.
  ────────────────────────────────────────────────────────── -->
  <g transform="translate(540,570) scale(1,0.88)" filter="url(#glow)">
    <g filter="url(#depth)">

      <!-- 0° (top) -->
      <rect x="-65" y="-390" width="130" height="370" rx="65" ry="65"
            fill="url(#p0)" transform="rotate(0)"/>

      <!-- 45° -->
      <rect x="-65" y="-390" width="130" height="370" rx="65" ry="65"
            fill="url(#p45)" transform="rotate(45)"/>

      <!-- 90° (right) -->
      <rect x="-65" y="-390" width="130" height="370" rx="65" ry="65"
            fill="url(#p90)" transform="rotate(90)"/>

      <!-- 135° -->
      <rect x="-65" y="-390" width="130" height="370" rx="65" ry="65"
            fill="url(#p135)" transform="rotate(135)"/>

      <!-- 180° (bottom) -->
      <rect x="-65" y="-390" width="130" height="370" rx="65" ry="65"
            fill="url(#p0)" transform="rotate(180)"/>

      <!-- 225° -->
      <rect x="-65" y="-390" width="130" height="370" rx="65" ry="65"
            fill="url(#p45)" transform="rotate(225)"/>

      <!-- 270° (left) -->
      <rect x="-65" y="-390" width="130" height="370" rx="65" ry="65"
            fill="url(#p90)" transform="rotate(270)"/>

      <!-- 315° -->
      <rect x="-65" y="-390" width="130" height="370" rx="65" ry="65"
            fill="url(#p135)" transform="rotate(315)"/>

    </g>

    <!-- Specular shine overlay (same octagon of petals, semi-transparent white) -->
    <g opacity="1">
      <rect x="-65" y="-390" width="130" height="370" rx="65" ry="65"
            fill="url(#shine)" transform="rotate(0)"/>
      <rect x="-65" y="-390" width="130" height="370" rx="65" ry="65"
            fill="url(#shine)" transform="rotate(45)"/>
      <rect x="-65" y="-390" width="130" height="370" rx="65" ry="65"
            fill="url(#shine)" transform="rotate(90)"/>
      <rect x="-65" y="-390" width="130" height="370" rx="65" ry="65"
            fill="url(#shine)" transform="rotate(135)"/>
      <rect x="-65" y="-390" width="130" height="370" rx="65" ry="65"
            fill="url(#shine)" transform="rotate(180)"/>
      <rect x="-65" y="-390" width="130" height="370" rx="65" ry="65"
            fill="url(#shine)" transform="rotate(225)"/>
      <rect x="-65" y="-390" width="130" height="370" rx="65" ry="65"
            fill="url(#shine)" transform="rotate(270)"/>
      <rect x="-65" y="-390" width="130" height="370" rx="65" ry="65"
            fill="url(#shine)" transform="rotate(315)"/>
    </g>
  </g>
</svg>
